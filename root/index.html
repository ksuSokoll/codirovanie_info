var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate
      title = (typeof title === 'string') ? {text: title} : title || {};
      title.text = title.text || null;
      title.id = (title.text) ? title.id || 'qrcode-title' : null;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var c, mc, r, mr, qrSvg='', rect;

      rect = 'l' + cellSize + ',0 0,' + cellSize +
        ' -' + cellSize + ',0 0,-' + cellSize + 'z ';

      qrSvg += '<svg version="1.1" xmlns="http://www.w3.org/2000/svg"';
      qrSvg += !opts.scalable ? ' width="' + size + 'px" height="' + size + 'px"' : '';
      qrSvg += ' viewBox="0 0 ' + size + ' ' + size + '" ';
      qrSvg += ' preserveAspectRatio="xMinYMin meet"';
      qrSvg += (title.text || alt.text) ? ' role="img" aria-labelledby="' +
          escapeXml([title.id, alt.id].join(' ').trim() ) + '"' : '';
      qrSvg += '>';
      qrSvg += (title.text) ? '<title id="' + escapeXml(title.id) + '">' +
          escapeXml(title.text) + '</title>' : '';
      qrSvg += (alt.text) ? '<description id="' + escapeXml(alt.id) + '">' +
          escapeXml(alt.text) + '</description>' : '';
      qrSvg += '<rect width="100%" height="100%" fill="white" cx="0" cy="0"/>';
      qrSvg += '<path d="';

      for (r = 0; r < _this.getModuleCount(); r += 1) {
        mr = r * cellSize + margin;
        for (c = 0; c < _this.getModuleCount(); c += 1) {
          if (_this.isDark(r, c) ) {
            mc = c*cellSize+margin;
            qrSvg += 'M' + mc + ',' + mr + rect;
          }
        }
      }

      qrSvg += '" stroke="transparent" fill="black"/>';
      qrSvg += '</svg>';

      return qrSvg;
    };

    _this.createDataURL = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      return createDataURL(size, size, function(x, y) {
        if (min <= x && x < max && min <= y && y < max) {
          var c = Math.floor( (x - min) / cellSize);
          var r = Math.floor( (y - min) / cellSize);
          return _this.isDark(r, c)? 0 : 1;
        } else {
          return 1;
        }
      } );
    };

    _this.createImgTag = function(cellSize, margin, alt) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;

      var img = '';
      img += '<img';
      img += '\u0020src="';
      img += _this.createDataURL(cellSize, margin);
      img += '"';
      img += '\u0020width="';
      img += size;
      img += '"';
      img += '\u0020height="';
      img += size;
      img += '"';
      if (alt) {
        img += '\u0020alt="';
        img += escapeXml(alt);
        img += '"';
      }
      img += '/>';

      return img;
    };

    var escapeXml = function(s) {
      var escaped = '';
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charAt(i);
        switch(c) {
        case '<': escaped += '&lt;'; break;
        case '>': escaped += '&gt;'; break;
        case '&': escaped += '&amp;'; break;
        case '"': escaped += '&quot;'; break;
        default : escaped += c; break;
        }
      }
      return escaped;
    };

    var _createHalfASCII = function(margin) {
      var cellSize = 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r1, r2, p;

      var blocks = {
        '██': '█',
        '█ ': '▀',
        ' █': '▄',
        '  ': ' '
      };

      var blocksLastLineNoMargin = {
        '██': '▀',
        '█ ': '▀',
        ' █': ' ',
        '  ': ' '
      };

      var ascii = '';
      for (y = 0; y < size; y += 2) {
        r1 = Math.floor((y - min) / cellSize);
        r2 = Math.floor((y + 1 - min) / cellSize);
        for (x = 0; x < size; x += 1) {
          p = '█';

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r1, Math.floor((x - min) / cellSize))) {
            p = ' ';
          }

          if (min <= x && x < max && min <= y+1 && y+1 < max && _this.isDark(r2, Math.floor((x - min) / cellSize))) {
            p += ' ';
          }
          else {
            p += '█';
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          ascii += (margin < 1 && y+1 >= max) ? blocksLastLineNoMargin[p] : blocks[p];
        }

        ascii += '\n';
      }

      if (size % 2 && margin > 0) {
        return ascii.substring(0, ascii.length - size - 1) + Array(size+1).join('▀');
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.createASCII = function(cellSize, margin) {
      cellSize = cellSize || 1;

      if (cellSize < 2) {
        return _createHalfASCII(margin);
      }

      cellSize -= 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r, p;

      var white = Array(cellSize+1).join('██');
      var black = Array(cellSize+1).join('  ');

      var ascii = '';
      var line = '';
      for (y = 0; y < size; y += 1) {
        r = Math.floor( (y - min) / cellSize);
        line = '';
        for (x = 0; x < size; x += 1) {
          p = 1;

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r, Math.floor((x - min) / cellSize))) {
            p = 0;
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          line += p ? white : black;
        }

        for (r = 0; r < cellSize; r += 1) {
          ascii += line + '\n';
        }
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.renderTo2dContext = function(context, cellSize) {
      cellSize = cellSize || 2;
      var length = _this.getModuleCount();
      for (var row = 0; row < length; row++) {
        for (var col = 0; col < length; col++) {
          context.fillStyle = _this.isDark(row, col) ? 'black' : 'white';
          context.fillRect(row * cellSize, col * cellSize, cellSize, cellSize);
        }
      }
    }

    return _this;
  };

  //---------------------------------------------------------------------
  // qrcode.stringToBytes
  //---------------------------------------------------------------------

  qrcode.stringToBytesFuncs = {
    'default' : function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        bytes.push(c & 0xff);
      }
      return bytes;
    }
  };

  qrcode.stringToBytes = qrcode.stringToBytesFuncs['default'];

  // ИСПРАВЛЕНИЕ: корректная кодировка UTF-8 (иначе кириллица считается неверно)
  qrcode.stringToBytes = function(s) {
    var utf8 = unescape(encodeURIComponent(s));
    var bytes = [];
    for (var i = 0; i < utf8.length; i++) bytes.push(utf8.charCodeAt(i) & 0xff);
    return bytes;
  };

  //---------------------------------------------------------------------
  // qrcode.createStringToBytes
  //---------------------------------------------------------------------

  /**
   * @param unicodeData base64 string of byte array.
   * [16bit Unicode],[16bit Bytes], ...
   * @param numChars
   */
  qrcode.createStringToBytes = function(unicodeData, numChars) {

    // create conversion map.

    var unicodeMap = function() {

      var bin = base64DecodeInputStream(unicodeData);
      var read = function() {
        var b = bin.read();
        if (b == -1) throw 'eof';
        return b;
      };

      var count = 0;
      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;
      }
      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;
    }();

    var unknownChar = '?'.charCodeAt(0);

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {
          var b = unicodeMap[s.charAt(i)];
          if (typeof b == 'number') {
            if ( (b & 0xff) == b) {
              // 1byte
              bytes.push(b);
            } else {
              // 2bytes
              bytes.push(b >>> 8);
              bytes.push(b & 0xff);
            }
          } else {
            bytes.push(unknownChar);
          }
        }
      }
      return bytes;
    };
  };

  //---------------------------------------------------------------------
  // QRMode
  //---------------------------------------------------------------------

  var QRMode = {
    MODE_NUMBER :    1 << 0,
    MODE_ALPHA_NUM : 1 << 1,
    MODE_8BIT_BYTE : 1 << 2,
    MODE_KANJI :     1 << 3
  };

  //---------------------------------------------------------------------
  // QRErrorCorrectionLevel
  //---------------------------------------------------------------------

  var QRErrorCorrectionLevel = {
    L : 1,
    M : 0,
    Q : 3,
    H : 2
  };

  //---------------------------------------------------------------------
  // QRMaskPattern
  //---------------------------------------------------------------------

  var QRMaskPattern = {
    PATTERN000 : 0,
    PATTERN001 : 1,
    PATTERN010 : 2,
    PATTERN011 : 3,
    PATTERN100 : 4,
    PATTERN101 : 5,
    PATTERN110 : 6,
    PATTERN111 : 7
  };

  //---------------------------------------------------------------------
  // QRUtil
  //---------------------------------------------------------------------

  var QRUtil = function() {

    var PATTERN_POSITION_TABLE = [
      [],
      [6, 18],
      [6, 22],
      [6, 26],
      [6, 30],
      [6, 34],

<style>
  :root{

  .tabpane{display:none;padding-top:26px;}
  .tabpane.active{display:block;}

  /* уровни */
  .level-bar{display:inline-flex;gap:0;border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-bottom:18px;}

  .level-btn.active{background:var(--teal);color:var(--off);}

  /* панели/карточки */
  .panel{background:var(--paper-2);border:1px solid var(--line);border-radius:6px;padding:20px;margin-bottom:20px;}

  h2.sec{font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-family:'SF Mono',monospace;color:var(--teal);border-top:2px solid var(--ink);padding-top:10px;margin:28px 0 16px;}
  h3.blk{font-size:18px;margin:0 0 12px;font-weight:600;}

  canvas{image-rendering:pixelated;border:1px solid var(--line);border-radius:4px;background:var(--off);}
</style>

<script>
const root = document.getElementById('root');
let level = 'base'; // base | adv

root.innerHTML = `
  <p class="eyebrow">Учебное средство · Информатика · базовый и углублённый уровни</p>
  <h1>Кодирование информации</h1>
  <p class="sub">Интерактивное средство для изучения раздела «Кодирование информации» школьного курса. Пять видов кодирования — числа, текст, графика, звук и помехоустойчивость — с тренажёрами, теорией и заданиями двух уровней сложности.</p>

  <div class="tabs">
    <div class="tab active" data-tab="num">Числа</div>
    <div class="tab" data-tab="txt">Текст</div>
    <div class="tab" data-tab="img">Графика</div>
    <div class="tab" data-tab="snd">Звук</div>
    <div class="tab" data-tab="ec">Помехоустойчивость</div>
  </div>

  <div class="tabpane active" id="pane-num"></div>
  <div class="tabpane" id="pane-txt"></div>
  <div class="tabpane" id="pane-img"></div>
  <div class="tabpane" id="pane-snd"></div>
  <div class="tabpane" id="pane-ec"></div>
`;

// переключение вкладок
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tabpane').forEach(p=>p.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('pane-'+this.getAttribute('data-tab')).classList.add('active');
  });
});

// helper: панель уровня (общая для вкладок, переключает видимость заданий)
function levelBar(onChange){
  return `<div class="level-bar">
    <button class="level-btn active" data-lv="base">Базовый</button>
    <button class="level-btn" data-lv="adv">Углублённый</button>
  </div>`;
}
function wireLevelBar(pane){
  pane.querySelectorAll('.level-btn').forEach(b=>{
    b.addEventListener('click',function(){
      pane.querySelectorAll('.level-btn').forEach(x=>x.classList.remove('active'));
      this.classList.add('active');
      const lv=this.getAttribute('data-lv');
      pane.querySelectorAll('[data-level]').forEach(el=>{
        el.style.display = (el.getAttribute('data-level')===lv)?'':'none';
      });
    });
  });
  //初期: показать базовый
  pane.querySelectorAll('[data-level]').forEach(el=>{
    el.style.display = (el.getAttribute('data-level')==='base')?'':'none';
  });
}
</script>

    <h2 class="sec">Теория</h2>
    <div class="card" data-level="base">
      <p style="margin:0 0 10px">В компьютере любая информация хранится в виде нулей и единиц — в <b>двоичной системе счисления</b>. Привычные нам числа записаны в десятичной системе (основание 10), а компьютер использует основание 2.</p>
      <p style="margin:0">Чтобы перевести число из десятичной системы в двоичную, его последовательно делят на 2, а остатки выписывают снизу вверх. Обратно — каждый разряд умножают на степень двойки и складывают.</p>
      <details class="info"><summary>Пример перевода 218 в двоичную</summary><div class="ic">218 ÷ 2 = 109 (ост. 0) → 109 ÷ 2 = 54 (ост. 1) → 54 ÷ 2 = 27 (ост. 0) → 27 ÷ 2 = 13 (ост. 1) → 13 ÷ 2 = 6 (ост. 1) → 6 ÷ 2 = 3 (ост. 0) → 3 ÷ 2 = 1 (ост. 1) → 1 ÷ 2 = 0 (ост. 1). Читаем остатки снизу вверх: <b>11011010</b>.</div></details>
    </div>
    <div class="card" data-level="adv">
      <p style="margin:0 0 10px">Восьмеричная и шестнадцатеричная системы используются как компактная запись двоичного кода. Одна восьмеричная цифра заменяет 3 двоичных разряда, одна шестнадцатеричная — 4 разряда (тетраду).</p>
      <p style="margin:0">Это удобно: длинный двоичный код <b>11011010</b> в шестнадцатеричной системе записывается всего двумя символами — <b>DA</b>. Поэтому шестнадцатеричную систему широко применяют в программировании, адресации памяти и записи цветов.</p>
      <details class="info"><summary>Связь 16-ричной и двоичной (по тетрадам)</summary><div class="ic">Разбиваем двоичное число на группы по 4 бита справа: 1101 1010. Каждую группу переводим в одну шестнадцатеричную цифру: 1101 = D, 1010 = A. Получаем DA. Обратный перевод так же прост — каждая цифра разворачивается в 4 бита.</div></details>
    </div>

    <h2 class="sec">Задания</h2>
    <div class="tasks" id="numTasks"></div>
  `;

  const inp = pane.querySelector('#numInput');
  const from = pane.querySelector('#numFrom');
  const out = pane.querySelector('#numOut');
  const viz = pane.querySelector('#numViz');
  const err = pane.querySelector('#numErr');

  function convert(){
    err.textContent=''; viz.innerHTML='';
    const base = parseInt(from.value);
    const raw = inp.value.trim().toUpperCase();
    if(!raw){ out.innerHTML=''; return; }
    // валидация по основанию
    const valid = {2:/^[01]+$/,8:/^[0-7]+$/,10:/^[0-9]+$/,16:/^[0-9A-F]+$/}[base];
    if(!valid.test(raw)){ out.innerHTML=''; err.textContent='Число не подходит для выбранной системы счисления.'; return; }
    const dec = parseInt(raw, base);
    if(dec>9007199254740991){ out.innerHTML=''; err.textContent='Слишком большое число для демонстрации.'; return; }
    out.innerHTML = `
      <div><span class="pill">10</span> ${dec}</div>
      <div><span class="pill">2</span> ${dec.toString(2)}</div>
      <div><span class="pill">8</span> ${dec.toString(8)}</div>
      <div><span class="pill">16</span> ${dec.toString(16).toUpperCase()}</div>`;
    // визуализация двоичного как байтов
    const bin = dec.toString(2);
    const padded = bin.padStart(Math.ceil(bin.length/8)*8, '0');
    let cells='';
    for(let i=0;i<padded.length;i++){
      cells += `<div class="bitcell ${padded[i]==='1'?'on':''}">${padded[i]}</div>`;
      if((i+1)%8===0 && i<padded.length-1) cells+='<div style="width:10px"></div>';
    }
    viz.innerHTML = `<div class="hint">Двоичное представление (по байтам, ${padded.length/8} байт):</div><div class="viz">${cells}</div>`;
  }
  inp.addEventListener('input',convert);
  from.addEventListener('change',convert);
  convert();

  // задания
  const tasksBase = [
    ["Переведите число 45 из десятичной системы в двоичную.","45 = 101101₂. Делим на 2 с остатками: 45→22(1), 22→11(0), 11→5(1), 5→2(1), 2→1(0), 1→0(1). Снизу вверх: 101101."],
    ["Переведите двоичное число 10010 в десятичную систему.","10010₂ = 18. Считаем по разрядам: 1·16 + 0·8 + 0·4 + 1·2 + 0·1 = 16 + 2 = 18."],
    ["Сколько различных значений можно закодировать пятью двоичными разрядами?","2⁵ = 32 значения (от 0 до 31). Каждый разряд удваивает количество комбинаций."],
  ];
  const tasksAdv = [
    ["Переведите число 1010 1111₂ в шестнадцатеричную систему.","Разбиваем на тетрады: 1010 = A, 1111 = F. Ответ: AF₁₆."],
    ["Переведите 2C₁₆ в десятичную и двоичную системы.","2C₁₆ = 2·16 + 12 = 44 в десятичной. В двоичной по тетрадам: 2 = 0010, C = 1100, значит 00101100."],
    ["Запишите число 100 в восьмеричной системе. Объясните связь с двоичной.","100₁₀ = 144₈. В двоичной 100 = 1100100, разбиваем на триады справа: 1 100 100 → 1, 4, 4 → 144₈."],
  ];
  function renderTasks(){
    const box = pane.querySelector('#numTasks');
    box.innerHTML = '';
    [['base',tasksBase],['adv',tasksAdv]].forEach(([lv,arr])=>{
      arr.forEach(([q,a])=>{
        const div=document.createElement('div');
        div.className='task'; div.setAttribute('data-level',lv);
        div.innerHTML=`<h4>${q}</h4><details class="sol"><summary>Показать решение</summary><div class="s">${a}</div></details>`;
        box.appendChild(div);
      });
    });
    wireLevelBar(pane);
  }
  renderTasks();
})();
</script>

<script>
/* ===================== ВКЛАДКА: ТЕКСТ ===================== */
(function(){
  const pane = document.getElementById('pane-txt');
  pane.innerHTML = `
    ${levelBar()}
    <div class="panel">
      <h3 class="blk">Кодирование текста</h3>
      <label class="field" for="txtInput">Введите текст</label>
      <input type="text" id="txtInput" value="Привет, QR!">
      <div class="result" id="txtOut"></div>
      <div id="txtTable" style="margin-top:12px"></div>
    </div>

    <h2 class="sec">Теория</h2>
    <div class="card" data-level="base">
      <p style="margin:0 0 10px">Каждый символ текста (буква, цифра, знак) кодируется числом. Соответствие «символ — число» задаётся <b>таблицей кодировки</b>. Историческая таблица ASCII отводила на символ 1 байт (8 бит) и вмещала 256 символов — этого хватало для латиницы, цифр и знаков.</p>
      <p style="margin:0">Чтобы узнать информационный объём текста в простой однобайтовой кодировке, достаточно умножить число символов на 1 байт.</p>
      <details class="info"><summary>Пример: вес слова в однобайтовой кодировке</summary><div class="ic">Слово «Информатика» содержит 11 символов. В однобайтовой кодировке (например, Windows-1251) каждый символ — 1 байт, поэтому объём текста: 11 × 1 = 11 байт = 88 бит.</div></details>
    </div>
    <div class="card" data-level="adv">
      <p style="margin:0 0 10px">Однобайтовых кодировок не хватает для всех языков мира. Современный стандарт <b>Unicode</b> охватывает символы всех письменностей. Распространённая его форма — <b>UTF-8</b> — кодирует символ переменным числом байтов: латиница и цифры занимают 1 байт, кириллица — 2 байта, многие иероглифы и эмодзи — 3–4 байта.</p>
      <p style="margin:0">Поэтому вес текста зависит не только от числа символов, но и от их алфавита. Одинаковые по длине надписи на русском и английском в UTF-8 займут разный объём.</p>
      <details class="info"><summary>Почему кириллица «тяжелее» латиницы</summary><div class="ic">В UTF-8 символы с кодом до 127 (латиница, цифры, базовые знаки) кодируются 1 байтом. Символы кириллицы имеют коды в диапазоне, требующем 2 байтов. Поэтому «Кот» (3 символа) в UTF-8 займёт 6 байт, а «Cat» — только 3 байта.</div></details>
    </div>

    <h2 class="sec">Задания</h2>
    <div class="tasks" id="txtTasks"></div>
  `;

  const inp = pane.querySelector('#txtInput');
  const out = pane.querySelector('#txtOut');
  const table = pane.querySelector('#txtTable');

  function analyze(){
    const text = inp.value;
    const chars = [...text];
    const bytes = new TextEncoder().encode(text);
    out.innerHTML = `
      <div><b>Символов:</b> ${chars.length}</div>
      <div><b>Байт в UTF-8:</b> ${bytes.length}</div>
      <div><b>В однобайтовой кодировке:</b> ${chars.length} байт</div>
      <div><b>Бит (UTF-8):</b> ${bytes.length*8}</div>`;
    // таблица первых символов
    let rows = chars.slice(0,12).map(ch=>{
      const code = ch.codePointAt(0);
      const b = new TextEncoder().encode(ch);
      return `<tr>
        <td style="padding:4px 10px;border-bottom:1px solid var(--line)">${ch===' '?'␣':ch}</td>
        <td style="padding:4px 10px;border-bottom:1px solid var(--line)">${code}</td>
        <td style="padding:4px 10px;border-bottom:1px solid var(--line)">${code.toString(16).toUpperCase().padStart(2,'0')}</td>
        <td style="padding:4px 10px;border-bottom:1px solid var(--line)">${b.length}</td>
      </tr>`;
    }).join('');
    table.innerHTML = `<div class="hint">Разбор символов:</div>
      <table style="border-collapse:collapse;font-family:'SF Mono',monospace;font-size:13px;margin-top:6px;width:100%">
        <tr style="color:var(--teal)"><th style="text-align:left;padding:4px 10px">Символ</th><th style="text-align:left;padding:4px 10px">Код (10)</th><th style="text-align:left;padding:4px 10px">Код (16)</th><th style="text-align:left;padding:4px 10px">Байт</th></tr>
        ${rows}
      </table>${chars.length>12?'<div class="hint">…показаны первые 12 символов</div>':''}`;
  }
  inp.addEventListener('input',analyze);
  analyze();

  const tasksBase = [
    ["Текст состоит из 200 символов и закодирован в однобайтовой кодировке. Каков его объём в байтах и битах?","200 символов × 1 байт = 200 байт. В битах: 200 × 8 = 1600 бит."],
    ["Сколько символов можно закодировать в однобайтовой кодировке?","256 символов. Один байт = 8 бит, значит 2⁸ = 256 различных кодов."],
    ["Слово состоит из 5 букв в однобайтовой кодировке. Сколько бит занимает слово?","5 × 8 = 40 бит. Каждый символ — 1 байт = 8 бит."],
  ];
  const tasksAdv = [
    ["Сколько байт в UTF-8 займёт слово «Робот» и слово «Robot»? Объясните разницу.","«Робот» — 5 кириллических символов × 2 байта = 10 байт. «Robot» — 5 латинских × 1 байт = 5 байт. Кириллица в UTF-8 кодируется двумя байтами."],
    ["Текст из 100 символов кириллицы закодирован в UTF-8. Каков его объём?","100 × 2 = 200 байт. В UTF-8 каждый кириллический символ занимает 2 байта."],
    ["Почему объём текста в UTF-8 нельзя вычислить, зная только количество символов?","Потому что в UTF-8 разные символы занимают разное число байтов (1–4). Нужно знать, из каких символов состоит текст: латиница — 1 байт, кириллица — 2, эмодзи — до 4."],
  ];
  const box = pane.querySelector('#txtTasks');
  [['base',tasksBase],['adv',tasksAdv]].forEach(([lv,arr])=>{
    arr.forEach(([q,a])=>{
      const div=document.createElement('div');
      div.className='task'; div.setAttribute('data-level',lv);
      div.innerHTML=`<h4>${q}</h4><details class="sol"><summary>Показать решение</summary><div class="s">${a}</div></details>`;
      box.appendChild(div);
    });
  });
  wireLevelBar(pane);
})();
</script>

<script>
/* ===================== ВКЛАДКА: ГРАФИКА ===================== */
(function(){
  const pane = document.getElementById('pane-img');
  pane.innerHTML = `
    ${levelBar()}
    <div class="panel">
      <h3 class="blk">Растровое изображение</h3>
      <p class="hint" style="margin-top:0">Кликайте по клеткам — это пиксели. Чёрный пиксель кодируется битом 1, белый — битом 0. Так компьютер хранит чёрно-белое растровое изображение.</p>
      <canvas id="imgCanvas" width="320" height="320" style="cursor:crosshair;margin-top:8px"></canvas>
      <div class="result" id="imgOut" style="margin-top:14px"></div>
      <button id="imgClear" style="font-family:'SF Mono',monospace;font-size:12px;background:var(--line);color:var(--ink);border:none;padding:8px 14px;border-radius:5px;cursor:pointer;margin-top:10px">Очистить</button>
    </div>

    <div class="panel">
      <h3 class="blk">Калькулятор объёма изображения</h3>
      <div class="row">
        <div class="col"><label class="field">Ширина (пикс.)</label><input type="number" id="imgW" value="800"></div>
        <div class="col"><label class="field">Высота (пикс.)</label><input type="number" id="imgH" value="600"></div>
        <div class="col"><label class="field">Глубина цвета</label>
          <select id="imgDepth">
            <option value="1">1 бит (2 цвета)</option>
            <option value="8">8 бит (256 цветов)</option>
            <option value="16">16 бит (65 536)</option>
            <option value="24" selected>24 бита (16,7 млн)</option>
          </select>
        </div>
      </div>
      <div class="result" id="imgCalc"></div>
    </div>

    <h2 class="sec">Теория</h2>
    <div class="card" data-level="base">
      <p style="margin:0 0 10px">Растровое изображение состоит из множества точек — <b>пикселей</b>, расположенных по сетке. Цвет каждого пикселя кодируется числом. Чем больше пикселей, тем детальнее картинка и тем больше её объём.</p>
      <p style="margin:0">Для чёрно-белого изображения на каждый пиксель нужен 1 бит. Объём = ширина × высота × 1 бит.</p>
      <details class="info"><summary>Пример: объём чёрно-белого рисунка</summary><div class="ic">Изображение 100 × 100 пикселей, чёрно-белое (1 бит на пиксель): объём = 100 × 100 × 1 = 10 000 бит = 1250 байт ≈ 1,2 КБ.</div></details>
    </div>
    <div class="card" data-level="adv">
      <p style="margin:0 0 10px">Количество цветов зависит от <b>глубины цвета</b> — числа бит на пиксель. При глубине <i>i</i> бит можно закодировать 2<sup><i>i</i></sup> цветов. Распространённый режим True Color использует 24 бита (по 8 на красный, зелёный и синий каналы) и даёт более 16 миллионов оттенков.</p>
      <p style="margin:0">Информационный объём растрового изображения: <b>V = W × H × i / 8</b> байт, где W и H — размеры в пикселях, i — глубина цвета в битах.</p>
      <details class="info"><summary>Пример: объём цветной фотографии</summary><div class="ic">Фото 1920 × 1080 при глубине 24 бита: V = 1920 × 1080 × 24 / 8 = 6 220 800 байт ≈ 5,93 МБ (без сжатия).</div></details>
    </div>

    <h2 class="sec">Задания</h2>
    <div class="tasks" id="imgTasks"></div>
  `;

  // пиксельный редактор
  const N = 8;
  const cv = pane.querySelector('#imgCanvas');
  const ctx = cv.getContext('2d');
  const px = cv.width / N;
  const grid = Array.from({length:N},()=>new Array(N).fill(0));
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    for(let y=0;y<N;y++)for(let x=0;x<N;x++){
      ctx.fillStyle = grid[y][x] ? getComputedStyle(root).getPropertyValue('--on').trim() : getComputedStyle(root).getPropertyValue('--off').trim();
      ctx.fillRect(x*px,y*px,px-1,py(y,x));
      ctx.strokeStyle = getComputedStyle(root).getPropertyValue('--line').trim();
      ctx.strokeRect(x*px,y*px,px,px);
    }
    showBits();
  }
  function py(){return px-1;}
  function showBits(){
    const out = pane.querySelector('#imgOut');
    const bits = grid.flat().join('');
    const black = grid.flat().filter(b=>b===1).length;
    out.innerHTML = `<div><b>Сетка:</b> ${N}×${N} = ${N*N} пикселей</div>
      <div><b>Двоичный код:</b> ${bits.match(/.{1,8}/g).join(' ')}</div>
      <div><b>Объём:</b> ${N*N} бит = ${N*N/8} байт · чёрных пикселей: ${black}</div>`;
  }
  cv.addEventListener('click',e=>{
    const r=cv.getBoundingClientRect();
    const x=Math.floor((e.clientX-r.left)/(r.width/N));
    const y=Math.floor((e.clientY-r.top)/(r.height/N));
    if(x>=0&&y>=0&&x<N&&y<N){ grid[y][x]^=1; draw(); }
  });
  pane.querySelector('#imgClear').addEventListener('click',()=>{
    for(let y=0;y<N;y++)grid[y].fill(0); draw();
  });
  // начальный рисунок — улыбка
  [[2,1],[2,6],[5,1],[5,6],[6,2],[6,3],[6,4],[6,5]].forEach(([y,x])=>grid[y][x]=1);
  draw();

  // калькулятор
  const W=pane.querySelector('#imgW'),Hh=pane.querySelector('#imgH'),D=pane.querySelector('#imgDepth'),calc=pane.querySelector('#imgCalc');
  function recalc(){
    const w=+W.value,h=+Hh.value,d=+D.value;
    if(!w||!h){calc.innerHTML='';return;}
    const bits=w*h*d, bytes=bits/8, kb=bytes/1024, mb=kb/1024;
    const colors = d>=30 ? '> 1 млрд' : (Math.pow(2,d)).toLocaleString('ru-RU');
    calc.innerHTML = `<div><b>Пикселей:</b> ${(w*h).toLocaleString('ru-RU')}</div>
      <div><b>Цветов:</b> ${colors}</div>
      <div><b>Объём:</b> ${bytes.toLocaleString('ru-RU')} байт ${kb>=1?'≈ '+kb.toFixed(1)+' КБ':''} ${mb>=1?'≈ '+mb.toFixed(2)+' МБ':''}</div>
      <div class="hint">V = ${w} × ${h} × ${d} / 8</div>`;
  }
  [W,Hh,D].forEach(el=>el.addEventListener('input',recalc));
  recalc();

  const tasksBase = [
    ["Чёрно-белое изображение имеет размер 50×40 пикселей. Каков его объём в битах и байтах?","50 × 40 × 1 = 2000 бит = 250 байт. На каждый пиксель чёрно-белого изображения нужен 1 бит."],
    ["Сколько пикселей в изображении размером 64×64?","64 × 64 = 4096 пикселей."],
    ["Сколько цветов можно закодировать при глубине цвета 8 бит?","2⁸ = 256 цветов."],
  ];
  const tasksAdv = [
    ["Вычислите объём изображения 1024×768 при глубине цвета 24 бита (в МБ).","V = 1024 × 768 × 24 / 8 = 2 359 296 байт = 2304 КБ = 2,25 МБ."],
    ["Изображение занимает 1 920 000 байт при размере 800×600. Какова глубина цвета?","i = V × 8 / (W × H) = 1 920 000 × 8 / (800 × 600) = 15 360 000 / 480 000 = 32 бита."],
    ["Во сколько раз вырастет объём изображения, если глубину цвета увеличить с 8 до 24 бит?","В 3 раза: объём прямо пропорционален глубине цвета, а 24 / 8 = 3."],
  ];
  const box = pane.querySelector('#imgTasks');
  [['base',tasksBase],['adv',tasksAdv]].forEach(([lv,arr])=>{
    arr.forEach(([q,a])=>{
      const div=document.createElement('div');
      div.className='task'; div.setAttribute('data-level',lv);
      div.innerHTML=`<h4>${q}</h4><details class="sol"><summary>Показать решение</summary><div class="s">${a}</div></details>`;
      box.appendChild(div);
    });
  });
  wireLevelBar(pane);
})();
</script>

<script>
/* ===================== ВКЛАДКА: ЗВУК ===================== */
(function(){
  const pane = document.getElementById('pane-snd');
  pane.innerHTML = `
    ${levelBar()}
    <div class="panel">
      <h3 class="blk">Дискретизация звука</h3>
      <p class="hint" style="margin-top:0">Звук — непрерывная волна. Чтобы сохранить его в цифровом виде, волну измеряют через равные промежутки времени (дискретизация) и округляют значения по уровням (квантование). Меняйте параметры и смотрите, как «ступеньки» приближают плавную волну.</p>
      <canvas id="sndCanvas" width="640" height="200" style="margin-top:8px;width:100%"></canvas>
      <div class="row" style="margin-top:14px">
        <div class="col"><label class="field">Частота дискретизации</label>
          <select id="sndRate">
            <option value="8">низкая (8 отсч.)</option>
            <option value="16" selected>средняя (16 отсч.)</option>
            <option value="32">высокая (32 отсч.)</option>
            <option value="64">очень высокая (64)</option>
          </select>
        </div>
        <div class="col"><label class="field">Разрядность (уровни)</label>
          <select id="sndBits">
            <option value="2">2 бита (4 уровня)</option>
            <option value="3" selected>3 бита (8 уровней)</option>
            <option value="4">4 бита (16 уровней)</option>
          </select>
        </div>
      </div>
    </div>

    <div class="panel">
      <h3 class="blk">Калькулятор объёма звука</h3>
      <div class="row">
        <div class="col"><label class="field">Частота (Гц)</label><input type="number" id="aRate" value="44100"></div>
        <div class="col"><label class="field">Разрядность (бит)</label><input type="number" id="aBits" value="16"></div>
        <div class="col"><label class="field">Каналы</label>
          <select id="aCh"><option value="1">1 — моно</option><option value="2" selected>2 — стерео</option></select>
        </div>
        <div class="col"><label class="field">Время (сек)</label><input type="number" id="aTime" value="60"></div>
      </div>
      <div class="result" id="aOut"></div>
    </div>

    <h2 class="sec">Теория</h2>
    <div class="card" data-level="base">
      <p style="margin:0 0 10px">Микрофон превращает звук в непрерывный электрический сигнал. Компьютер не умеет хранить непрерывное — он измеряет уровень сигнала много раз в секунду. Это называется <b>дискретизацией</b>, а число измерений в секунду — <b>частотой дискретизации</b> (в герцах).</p>
      <p style="margin:0">Чем чаще измеряем и чем больше уровней громкости различаем, тем точнее цифровая копия звука и тем больше её объём.</p>
      <details class="info"><summary>Что слышно на слайде</summary><div class="ic">Плавная синяя кривая — исходный звук. Оранжевые «ступеньки» — то, что сохранит компьютер. Увеличьте частоту дискретизации и разрядность — ступеньки станут мельче и точнее повторят волну.</div></details>
    </div>
    <div class="card" data-level="adv">
      <p style="margin:0 0 10px">Каждое измерение (отсчёт) сохраняется числом из нескольких бит — это <b>разрядность</b> (глубина квантования). При разрядности <i>i</i> бит сигнал делится на 2<sup><i>i</i></sup> уровней громкости.</p>
      <p style="margin:0">Объём звукового файла без сжатия: <b>V = частота × разрядность × каналы × время</b> (в битах). Стандарт аудио-CD: 44 100 Гц, 16 бит, 2 канала.</p>
      <details class="info"><summary>Пример: минута стереозвука CD-качества</summary><div class="ic">V = 44 100 × 16 × 2 × 60 = 84 672 000 бит = 10 584 000 байт ≈ 10,1 МБ за одну минуту несжатого звука.</div></details>
    </div>

    <h2 class="sec">Задания</h2>
    <div class="tasks" id="sndTasks"></div>
  `;

  // визуализация дискретизации
  const cv = pane.querySelector('#sndCanvas');
  const ctx = cv.getContext('2d');
  const rate = pane.querySelector('#sndRate');
  const bitsSel = pane.querySelector('#sndBits');
  function drawWave(){
    const W=cv.width,H=cv.height,mid=H/2,amp=H*0.38;
    ctx.clearRect(0,0,W,H);
    const R=+rate.value, levels=Math.pow(2,+bitsSel.value);
    // исходная волна
    ctx.strokeStyle=getComputedStyle(root).getPropertyValue('--teal2').trim();
    ctx.lineWidth=2; ctx.beginPath();
    for(let x=0;x<=W;x++){ const t=x/W; const y=mid - amp*Math.sin(t*Math.PI*4); if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    ctx.stroke();
    // ступеньки (дискретизация + квантование)
    ctx.fillStyle=getComputedStyle(root).getPropertyValue('--gold').trim();
    ctx.strokeStyle=getComputedStyle(root).getPropertyValue('--acc').trim();
    ctx.lineWidth=1.5;
    const step=W/R;
    ctx.beginPath();
    for(let i=0;i<R;i++){
      const t=(i+0.5)/R;
      let v=Math.sin(t*Math.PI*4); // -1..1
      // квантование
      let q=Math.round((v+1)/2*(levels-1))/(levels-1)*2-1;
      const y=mid-amp*q;
      const x=i*step;
      ctx.fillRect(x,Math.min(y,mid),Math.max(step-1,1),Math.abs(y-mid)||1);
      ctx.fillRect(x,y-2,Math.max(step-1,1),4);
    }
    // уровни квантования (горизонтальные линии)
    ctx.strokeStyle=getComputedStyle(root).getPropertyValue('--line').trim();
    ctx.lineWidth=0.5;
    for(let l=0;l<levels;l++){ const y=mid-amp+(2*amp)*l/(levels-1); ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  }
  rate.addEventListener('change',drawWave);
  bitsSel.addEventListener('change',drawWave);
  drawWave();

  // калькулятор
  const aRate=pane.querySelector('#aRate'),aBits=pane.querySelector('#aBits'),aCh=pane.querySelector('#aCh'),aTime=pane.querySelector('#aTime'),aOut=pane.querySelector('#aOut');
  function recalc(){
    const r=+aRate.value,b=+aBits.value,c=+aCh.value,t=+aTime.value;
    if(!r||!b||!t){aOut.innerHTML='';return;}
    const bits=r*b*c*t, bytes=bits/8, mb=bytes/1024/1024;
    aOut.innerHTML=`<div><b>Объём:</b> ${bits.toLocaleString('ru-RU')} бит</div>
      <div>= ${bytes.toLocaleString('ru-RU')} байт ${mb>=1?'≈ '+mb.toFixed(2)+' МБ':'≈ '+(bytes/1024).toFixed(1)+' КБ'}</div>
      <div class="hint">V = ${r} × ${b} × ${c} × ${t}</div>`;
  }
  [aRate,aBits,aCh,aTime].forEach(el=>el.addEventListener('input',recalc));
  recalc();

  const tasksBase = [
    ["Что такое частота дискретизации и в чём она измеряется?","Это число измерений (отсчётов) звукового сигнала за одну секунду. Измеряется в герцах (Гц). Например, 44 100 Гц — 44 100 измерений в секунду."],
    ["Звук записан с частотой 8000 Гц. Сколько отсчётов будет за 5 секунд?","8000 × 5 = 40 000 отсчётов."],
    ["Как изменится точность цифрового звука, если повысить частоту дискретизации?","Точность вырастет: чем чаще измеряется сигнал, тем ближе цифровая копия к исходной волне, но и объём файла увеличится."],
  ];
  const tasksAdv = [
    ["Вычислите объём (в МБ) моноаудио: 22 050 Гц, 8 бит, 30 секунд.","V = 22 050 × 8 × 1 × 30 = 5 292 000 бит = 661 500 байт ≈ 0,63 МБ."],
    ["Стереозапись CD-качества (44 100 Гц, 16 бит, 2 канала) длится 3 минуты. Каков объём?","V = 44 100 × 16 × 2 × 180 = 254 016 000 бит = 31 752 000 байт ≈ 30,3 МБ."],
    ["Файл моно 16 бит занял 882 000 байт за 10 секунд. Какова частота дискретизации?","Частота = V×8 / (бит × каналы × время) = 882 000 × 8 / (16 × 1 × 10) = 7 056 000 / 160 = 44 100 Гц."],
  ];
  const box = pane.querySelector('#sndTasks');
  [['base',tasksBase],['adv',tasksAdv]].forEach(([lv,arr])=>{
    arr.forEach(([q,a])=>{
      const div=document.createElement('div');
      div.className='task'; div.setAttribute('data-level',lv);
      div.innerHTML=`<h4>${q}</h4><details class="sol"><summary>Показать решение</summary><div class="s">${a}</div></details>`;
      box.appendChild(div);
    });
  });
  wireLevelBar(pane);
})();
</script>

<script>
/* ===================== ВКЛАДКА: ПОМЕХОУСТОЙЧИВОСТЬ ===================== */
(function(){
  const pane = document.getElementById('pane-ec');
  pane.innerHTML = `
    ${levelBar()}
    <div class="panel">
      <h3 class="blk">Бит чётности</h3>
      <p class="hint" style="margin-top:0">Простейший способ обнаружить ошибку при передаче данных — добавить к коду <b>бит чётности</b>. Кликайте по битам, меняя их, и следите за контрольным битом (золотой). Он подбирается так, чтобы общее число единиц было чётным.</p>
      <div class="viz" id="parityViz" style="margin-top:12px"></div>
      <div class="result" id="parityOut" style="margin-top:12px"></div>
      <button id="parityFlip" style="font-family:'SF Mono',monospace;font-size:12px;background:var(--acc);color:var(--off);border:none;padding:8px 14px;border-radius:5px;cursor:pointer;margin-top:10px">Имитировать ошибку при передаче</button>
    </div>

    <div class="panel">
      <h3 class="blk">QR-код: помехоустойчивость на практике</h3>
      <p class="hint" style="margin-top:0">QR-код — яркий пример помехоустойчивого кодирования. Он использует коды Рида—Соломона и читается, даже если повреждён. Введите текст и постройте настоящий сканируемый код.</p>
      <label class="field" for="qrInput" style="margin-top:8px">Текст или ссылка</label>
      <input type="text" id="qrInput" value="ЮФУ · кодирование">
      <canvas id="qrCanvas" width="280" height="280" style="margin-top:12px;display:block"></canvas>
      <div class="result" id="qrOut" style="margin-top:10px"></div>
    </div>

    <h2 class="sec">Теория</h2>
    <div class="card" data-level="base">
      <p style="margin:0 0 10px">При передаче и хранении данных возможны ошибки: бит может «перевернуться» из-за помех. Чтобы их замечать, к данным добавляют <b>избыточную</b> информацию — дополнительные биты, вычисленные по основным.</p>
      <p style="margin:0">Простейший вариант — бит чётности: он равен 0 или 1 так, чтобы количество единиц во всём коде было чётным. Если при передаче один бит исказится, чётность нарушится — и приёмник поймёт, что произошла ошибка.</p>
      <details class="info"><summary>Пример проверки чётности</summary><div class="ic">Передаём байт 1010011 (четыре единицы — чётно), добавляем бит чётности 0: 10100110. Если приёмник получил код с нечётным числом единиц — значит, при передаче возникла ошибка.</div></details>
    </div>
    <div class="card" data-level="adv">
      <p style="margin:0 0 10px">Бит чётности лишь <i>обнаруживает</i> одиночную ошибку, но не исправляет её и не замечает двойную. Более мощные <b>корректирующие коды</b> (Хэмминга, Рида—Соломона) добавляют больше избыточности и позволяют не только находить, но и <i>восстанавливать</i> искажённые данные.</p>
      <p style="margin:0">Коды Рида—Соломона применяются в QR-кодах, на компакт-дисках и в космической связи. В QR-коде можно потерять до 30% изображения — и он всё равно прочитается. Это плата за надёжность: чем больше проверочных данных, тем меньше места под полезные.</p>
      <details class="info"><summary>Связь с темой «Кодирование информации»</summary><div class="ic">Помехоустойчивое кодирование завершает тему: данные нужно не только компактно представить (числа, текст, графика, звук), но и надёжно передать. Избыточность — фундаментальное понятие, объединяющее теорию информации и практику передачи данных.</div></details>
    </div>

    <h2 class="sec">Задания</h2>
    <div class="tasks" id="ecTasks"></div>
  `;

  // бит чётности
  let dataBits = [1,0,1,0,0,1,1];
  const pviz = pane.querySelector('#parityViz');
  const pout = pane.querySelector('#parityOut');
  function parity(){ return dataBits.reduce((a,b)=>a+b,0)%2; }
  function renderParity(broken){
    const p = parity();
    let html='';
    dataBits.forEach((b,i)=>{ html+=`<div class="bitcell ${b?'on':''}" data-i="${i}">${b}</div>`; });
    html+=`<div class="bitcell parity" title="бит чётности">${p}</div>`;
    pviz.innerHTML=html;
    pviz.querySelectorAll('.bitcell[data-i]').forEach(c=>{
      c.addEventListener('click',function(){ const i=+this.getAttribute('data-i'); dataBits[i]^=1; renderParity(false); });
    });
    const ones = dataBits.reduce((a,b)=>a+b,0)+p;
    if(broken){
      pout.innerHTML=`<div style="color:var(--acc)"><b>Ошибка обнаружена!</b> Один бит исказился при передаче. Всего единиц: ${ones-1} (нечётно) — чётность нарушена, приёмник запросит повтор.</div>`;
    }else{
      pout.innerHTML=`<div><b>Бит чётности:</b> ${p}</div><div><b>Всего единиц с контрольным битом:</b> ${ones} (чётно ✓)</div><div class="hint">Полный код: ${dataBits.join('')}${p}</div>`;
    }
  }
  pane.querySelector('#parityFlip').addEventListener('click',()=>{
    // имитируем порчу: показываем сообщение об ошибке, не меняя данные
    renderParity(true);
  });
  renderParity(false);

  // QR
  const QR = window.__qrcode;
  const qi = pane.querySelector('#qrInput');
  const qcv = pane.querySelector('#qrCanvas');
  const qout = pane.querySelector('#qrOut');
  function cssVar(n){return getComputedStyle(root).getPropertyValue(n).trim();}
  function drawQR(){
    const text=qi.value||' ';
    let qr;
    try{ qr=QR(0,'M'); qr.addData(text); qr.make(); }catch(e){ qout.innerHTML='<span style="color:var(--acc)">Слишком длинный текст</span>'; return; }
    const n=qr.getModuleCount(),q=4,total=n+q*2,scale=Math.floor(560/total),px=total*scale;
    qcv.width=px;qcv.height=px;
    const ctx=qcv.getContext('2d');
    ctx.fillStyle=cssVar('--off');ctx.fillRect(0,0,px,px);
    ctx.fillStyle=cssVar('--on');
    for(let y=0;y<n;y++)for(let x=0;x<n;x++) if(qr.isDark(y,x)) ctx.fillRect((x+q)*scale,(y+q)*scale,scale,scale);
    const bytes=new TextEncoder().encode(text).length;
    qout.innerHTML=`<div><b>Версия:</b> ${(n-17)/4} · <b>матрица:</b> ${n}×${n} · <b>байт:</b> ${bytes}</div>`;
  }
  qi.addEventListener('input',drawQR);
  drawQR();

  const tasksBase = [
    ["К коду 1101 добавьте бит чётности так, чтобы число единиц было чётным.","В коде 1101 три единицы (нечётно). Бит чётности = 1, чтобы единиц стало четыре. Полный код: 11011."],
    ["Зачем к данным добавляют бит чётности?","Чтобы обнаруживать ошибки передачи: если один бит исказится, число единиц станет нечётным и приёмник заметит ошибку."],
    ["Приёмник получил код 1011010 с битом чётности для чётности. Единиц нечётное число. Что это значит?","Произошла ошибка передачи: чётность нарушена, значит хотя бы один бит исказился."],
  ];
  const tasksAdv = [
    ["Почему бит чётности не обнаруживает двойную ошибку?","Если исказятся сразу два бита, число единиц изменится на чётную величину и чётность сохранится — ошибка останется незамеченной."],
    ["Чем коды Рида—Соломона лучше бита чётности?","Они добавляют больше избыточности и позволяют не только обнаруживать, но и исправлять ошибки, в том числе множественные — вплоть до восстановления крупных повреждённых участков."],
    ["В QR-коде уровень коррекции H восстанавливает до 30% данных. В чём плата за такую надёжность?","Чем выше уровень коррекции, тем больше проверочных байтов и меньше места под полезные данные — при том же размере кода придётся либо сократить сообщение, либо увеличить матрицу."],
  ];
  const box = pane.querySelector('#ecTasks');
  [['base',tasksBase],['adv',tasksAdv]].forEach(([lv,arr])=>{
    arr.forEach(([q,a])=>{
      const div=document.createElement('div');
      div.className='task'; div.setAttribute('data-level',lv);
      div.innerHTML=`<h4>${q}</h4><details class="sol"><summary>Показать решение</summary><div class="s">${a}</div></details>`;
      box.appendChild(div);
    });
  });
  wireLevelBar(pane);
})();
</script>
